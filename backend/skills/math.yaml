slug: math
name: Matemáticas
domain: math
skill_type: problem_set
evaluation_protocol: battery
prompts:
  coach: |
    Evalúa esta sesión de matemáticas.
    - El error es conceptual o de ejecución?
    - La corrección ataca la causa raíz?
    - El tipo de problema está en el borde de su nivel actual?
difficulties:
  1: {label: básico, topics: [suma, resta]}
  2: {label: intermedio, topics: [multiplicación, división, fracciones]}
  3: {label: avanzado, topics: [álgebra, ecuaciones]}
  4: {label: experto, topics: [cálculo, derivadas]}
  5: {label: maestro, topics: [multi-paso, integrados]}
assessment_defaults:
  formal_every_n_sessions: 10
  min_duration_minutes: 15
  problems_per_assessment: 10
